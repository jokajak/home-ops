---
apiVersion: v1
kind: Namespace
metadata:
  name: default
  labels:
    kustomize.toolkit.fluxcd.io/prune: disabled
  annotations:
    # allow VolSync movers to run as root in this namespace (unifi/zwave/esphome
    # store config as root-owned 0600 files the mover must read for backup)
    volsync.backube/privileged-movers: "true"
