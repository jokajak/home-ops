---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-database
  namespace: default
spec:
  instances: 3
  postgresql:
    # pgvecto.rs -> VectorChord migration complete; only vchord is needed now.
    shared_preload_libraries:
      - "vchord.so"
    parameters:
      max_connections: "300"
      shared_buffers: 512MB
  # VectorChord-only image (pgvecto.rs removed post-migration). Pinned to pg 16.9
  # to match the running server version (16-0.3.0 could resolve to 16.8 = downgrade).
  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:16.9-0.3.0
  affinity:
    nodeSelector:
      # use all the same arch
      kubernetes.io/arch: amd64
  primaryUpdateStrategy: unsupervised
  storage:
    size: 10Gi
    storageClass: openebs-hostpath
  nodeMaintenanceWindow:
    inProgress: false
    reusePVC: true
  resources:
    requests:
      cpu: 500m
    limits:
      memory: 2Gi
  enableSuperuserAccess: true
  monitoring:
    enablePodMonitor: true
    # Ref: https://github.com/cloudnative-pg/cloudnative-pg/issues/2501
    podMonitorMetricRelabelings:
      - {
          sourceLabels: ["cluster"],
          targetLabel: cnpg_cluster,
          action: replace,
        }
      - { regex: cluster, action: labeldrop }
  backup:
    retentionPolicy: 30d
    barmanObjectStore: &barmanObjectStore
      data:
        compression: bzip2
      wal:
        compression: bzip2
        maxParallel: 2
      destinationPath: s3://databases/
      endpointURL: https://s3.${SECRET_DOMAIN:=internal}
      serverName: immich-v3
      s3Credentials:
        accessKeyId:
          name: minio-immich-pgsql
          key: minio_s3_access_key
        secretAccessKey:
          name: minio-immich-pgsql
          key: minio_s3_secret_access_key
  managed:
    roles:
      - name: immich
        ensure: present
        login: true
        superuser: true
        passwordSecret:
          name: immich-pg-secret
  bootstrap:
    initdb:
      database: immich
      owner: immich
      postInitApplicationSQL:
        - CREATE EXTENSION IF NOT EXISTS vchord CASCADE;
