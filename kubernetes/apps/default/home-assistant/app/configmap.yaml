---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.26.1-standalone-strict/configmap-v1.json
apiVersion: v1
kind: ConfigMap
metadata:
  name: home-assistant-recorder
  namespace: default
  labels:
    app.kubernetes.io/name: home-assistant
data:
  # Mounted at /config/packages/recorder.yaml; picked up via
  # `homeassistant: packages: !include_dir_named packages` in configuration.yaml.
  # db_url is resolved at runtime from the RECORDER_DB_URL env var (CNPG secret),
  # so no credential is stored here.
  recorder.yaml: |
    recorder:
      db_url: !env_var RECORDER_DB_URL
      # 30-day retention (HA default is 10). auto_purge, auto_repack and
      # commit_interval are left at their sensible HA defaults.
      purge_keep_days: 30
      # NOTE: include.domains is an allowlist — ONLY these domains are
      # recorded; everything else (light, climate, binary_sensor, lock,
      # cover, person, ...) is dropped. Restored from the prior config.
      include:
        domains:
          - sensor
          - switch
          - media_player
      exclude:
        entities:
          - sensor.last_boot
          - sensor.date
        entity_globs:
          - sensor.weather_*
