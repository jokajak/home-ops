---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
# S3 credentials for CNPG/Barman to back up the home-assistant-db cluster to
# MinIO. Backed by the shared `minio-tf-databases` Bitwarden item (created by
# terraform/minio for the `databases` bucket; also used by immich and the
# shared postgres cluster) — not a per-app credential.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minio-home-assistant-pgsql
  namespace: default
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-login
  target:
    name: minio-home-assistant-pgsql
    deletionPolicy: Delete
    template:
      type: Opaque
      metadata:
        labels:
          cnpg.io/reload: "true"
      data:
        minio_s3_access_key: |-
          {{ .minio_user }}
        minio_s3_secret_access_key: |-
          {{ .minio_secret }}
  refreshInterval: 15m
  data:
    - secretKey: minio_user
      remoteRef:
        key: minio-tf-databases
        property: username
    - secretKey: minio_secret
      remoteRef:
        key: minio-tf-databases
        property: password
