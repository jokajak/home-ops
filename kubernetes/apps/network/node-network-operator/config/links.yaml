---
# Bridge interface — hosts the VPN subnet on the node running VPN pods.
# All VPN pods (vpn-gateway, vpn-dns, qbittorrent) are pinned to the same node
# via nodeSelector so this bridge is purely local — no VXLAN overlay needed.
apiVersion: nodenetworkoperator.soliddowant.dev/v1alpha1
kind: Link
metadata:
  name: vpn-gateway-bridge
spec:
  interfaceName: vpn-gw-bridge0
  bridge:
    mtu: 1420
