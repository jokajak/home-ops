---
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: iot-vlan
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "plugins": [
        {
          "type": "macvlan",
          "master": "eth0.50",
          "mode": "bridge",
          "ipam": {
            "type": "whereabouts",
            "range": "${IOT_POD_CIDR:=192.168.1.0/24}",
            "gateway": "${IOT_GATEWAY:=192.168.1.1}",
            "routes": [
              {
                "dst": "${LAN_CIDR:=192.168.1.0/24}",
                "gw": "${IOT_GATEWAY:=192.168.1.1}"
              }
            ]
          }
        },
        {
          "capabilities": { "mac": true },
          "type": "tuning"
        }
      ]
    }
