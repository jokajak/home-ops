---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps-mealie
  namespace: flux-system
spec:
  targetNamespace: productivity
  interval: 10m
  path: "./kubernetes/apps/productivity/mealie/app"
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  wait: true
  components:
    - ../../../../components/volsync
  postBuild:
    substitute:
      APP: mealie
      GATUS_SUBDOMAIN: recipes
      VOLSYNC_PUID: "65534"
      VOLSYNC_PGID: "65534"
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      - kind: Secret
        name: cluster-secrets
