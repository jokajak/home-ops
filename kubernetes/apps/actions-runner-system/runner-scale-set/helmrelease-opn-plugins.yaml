---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opn-plugins-runner
  namespace: actions-runner-system
spec:
  interval: 30m
  chart:
    spec:
      chart: gha-runner-scale-set
      version: ">=0.9.0"
      sourceRef:
        kind: HelmRepository
        name: actions-runner-controller
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    githubConfigUrl: "https://github.com/jokajak/opn-plugins-source"
    githubConfigSecret: github-app-secret
    minRunners: 0
    maxRunners: 5
    runnerGroup: "Default"
    template:
      spec:
        containers:
          - name: runner
            image: ghcr.io/actions/actions-runner:latest
            command: ["/home/runner/run.sh"]
            env:
              - name: PKG_SIGNING_KEY
                valueFrom:
                  secretKeyRef:
                    name: opn-plugins-signing-key
                    key: private_key
              - name: GITHUB_APP_ID
                valueFrom:
                  secretKeyRef:
                    name: github-app-secret
                    key: github_app_id
              - name: GITHUB_APP_PRIVATE_KEY
                valueFrom:
                  secretKeyRef:
                    name: github-app-secret
                    key: github_app_private_key
