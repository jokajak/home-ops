---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: home-ops-runner
  namespace: actions-runner-system
spec:
  interval: 30m
  chart:
    spec:
      chart: gha-runner-scale-set
      version: "0.14.2"
      sourceRef:
        kind: HelmRepository
        name: actions-runner-controller
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: actions.github.com
              version: v1alpha1
              kind: AutoscalingRunnerSet
            patch: |
              - op: add
                path: /metadata/labels/actions.github.com~1scale-set-version
                value: "0.14.0"
  values:
    githubConfigUrl: "https://github.com/jokajak/home-ops"
    githubConfigSecret: github-app-secret
    minRunners: 0
    maxRunners: 5
    runnerGroup: "Default"
    controllerServiceAccount:
      namespace: actions-runner-system
      name: actions-runner-controller-gha-rs-controller
    template:
      spec:
        containers:
          - name: runner
            image: ghcr.io/actions/actions-runner:latest
            command: ["/home/runner/run.sh"]
