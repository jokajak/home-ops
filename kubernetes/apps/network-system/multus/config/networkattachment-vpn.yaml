---
# Gateway pod attachment — fixed IP 192.168.24.254
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: gateway-network-vpn-gateway-pod
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "bridge",
      "bridge": "vpn-gw-bridge0",
      "ipam": {
        "type": "whereabouts",
        "range": "192.168.24.0/24",
        "range_start": "192.168.24.254",
        "range_end": "192.168.24.254"
      },
      "mtu": 1420
    }
---
# General client pod attachment — dynamic IP from 192.168.24.1–192.168.24.127
# Routes all public internet via the VPN gateway (192.168.24.254).
# Excludes all RFC-1918 ranges so cluster traffic and node subnet
# stay on the primary CNI (eth0).
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: gateway-network-client-pods
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "bridge",
      "bridge": "vpn-gw-bridge0",
      "ipam": {
        "type": "whereabouts",
        "range": "192.168.24.0/24",
        "range_start": "192.168.24.1",
        "range_end": "192.168.24.127",
        "routes": [
          {"dst": "0.0.0.0/5"},
          {"dst": "8.0.0.0/7"},
          {"dst": "11.0.0.0/8"},
          {"dst": "12.0.0.0/6"},
          {"dst": "16.0.0.0/4"},
          {"dst": "32.0.0.0/3"},
          {"dst": "64.0.0.0/2"},
          {"dst": "128.0.0.0/3"},
          {"dst": "160.0.0.0/5"},
          {"dst": "168.0.0.0/6"},
          {"dst": "172.0.0.0/12"},
          {"dst": "172.32.0.0/11"},
          {"dst": "172.64.0.0/10"},
          {"dst": "172.128.0.0/9"},
          {"dst": "173.0.0.0/8"},
          {"dst": "174.0.0.0/7"},
          {"dst": "176.0.0.0/4"},
          {"dst": "192.0.0.0/9"},
          {"dst": "192.128.0.0/11"},
          {"dst": "192.160.0.0/13"},
          {"dst": "192.169.0.0/16"},
          {"dst": "192.170.0.0/15"},
          {"dst": "192.172.0.0/14"},
          {"dst": "192.176.0.0/12"},
          {"dst": "192.192.0.0/10"},
          {"dst": "193.0.0.0/8"},
          {"dst": "194.0.0.0/7"},
          {"dst": "196.0.0.0/6"},
          {"dst": "200.0.0.0/5"},
          {"dst": "208.0.0.0/4"},
          {"dst": "224.0.0.0/3"}
        ],
        "gateway": "192.168.24.254"
      },
      "mtu": 1420
    }
---
