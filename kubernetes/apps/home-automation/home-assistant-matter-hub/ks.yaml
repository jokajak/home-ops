---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps-ha-matter-hub
  namespace: flux-system
spec:
  targetNamespace: home-automation
  components:
    - ../../../../components/volsync
  interval: 10m
  path: "./kubernetes/apps/home-automation/home-assistant-matter-hub/app"
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  wait: true
  postBuild:
    substitute:
      APP: home-assistant-matter-hub
      GATUS_SUBDOMAIN: matterhub
      VOLSYNC_CLAIM: home-assistant-matter-hub-data
      VOLSYNC_CAPACITY: 1Gi
      VOLSYNC_STORAGECLASS: nfs-csi
    substituteFrom:
      - kind: Secret
        name: cluster-secrets
  dependsOn:
    - name: cluster-apps-external-secrets
