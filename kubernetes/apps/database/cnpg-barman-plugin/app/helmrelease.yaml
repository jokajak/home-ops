---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plugin-barman-cloud
  namespace: database
spec:
  interval: 30m
  chart:
    spec:
      # chart 0.7.0 -> plugin appVersion v0.13.0 (requires CNPG >= 1.26)
      chart: plugin-barman-cloud
      version: 0.7.0
      sourceRef:
        kind: HelmRepository
        name: cnpg-charts
        namespace: database
  maxHistory: 2
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  # Chart defaults are sufficient: it self-provisions cert-manager certs
  # (selfsigned-issuer) and installs the barmancloud.cnpg.io ObjectStore CRD.
  values:
    crds:
      create: true
