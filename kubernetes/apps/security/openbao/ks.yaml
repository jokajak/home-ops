---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps-openbao
  namespace: flux-system
spec:
  interval: 10m
  path: ./kubernetes/apps/security/openbao/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  wait: true
  retryInterval: 1m
  timeout: 5m
  dependsOn:
    - name: cluster-apps-external-secrets
  components:
    - ../../../../components/volsync
  postBuild:
    substitute:
      APP: openbao
      VOLSYNC_CLAIM: data-openbao-0
      VOLSYNC_PUID: "100"
      VOLSYNC_PGID: "1000"
    substituteFrom:
      - kind: Secret
        name: cluster-secrets
