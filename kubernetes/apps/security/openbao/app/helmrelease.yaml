---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openbao
  namespace: security
spec:
  interval: 30m
  chart:
    spec:
      chart: openbao
      version: 0.28.4
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: openbao
        namespace: security
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    server:
      dataStorage:
        enabled: true
        size: 1Gi
        storageClass: openebs-hostpath
      # Single-node raft — no external storage dependency.
      # After first deploy: bao operator init, then bao operator unseal.
      config: |
        ui = true
        listener "tcp" {
          tls_disable = 1
          address = "[::]:8200"
          cluster_address = "[::]:8201"
        }
        storage "raft" {
          path = "/openbao/data"
          node_id = "node1"
        }
        service_registration "kubernetes" {}
      ingress:
        enabled: true
        ingressClassName: internal
        hosts:
          - host: openbao.${SECRET_DOMAIN:=internal}
            paths: []
        tls:
          - hosts:
              - openbao.${SECRET_DOMAIN:=internal}
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 512Mi
    ui:
      enabled: true
      serviceType: ClusterIP
