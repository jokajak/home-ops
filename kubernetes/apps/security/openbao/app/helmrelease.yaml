---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openbao
  namespace: security
spec:
  interval: 30m
  chart:
    spec:
      chart: openbao
      version: 0.28.4
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: openbao
        namespace: security
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    server:
      dataStorage:
        enabled: true
        size: 1Gi
        storageClass: openebs-hostpath
      extraSecretEnvironmentVars:
        - envName: OPENBAO_UNSEAL_KEY
          secretName: openbao-unseal
          secretKey: unseal_key
      # Single-node raft with static auto-unseal (OpenBao 2.4+).
      # The AES-256 key comes from the openbao-unseal Secret (ESO → Bitwarden).
      # After first deploy run `bao operator init` once to produce recovery keys.
      config: |
        ui = true
        listener "tcp" {
          tls_disable = 1
          address = "[::]:8200"
          cluster_address = "[::]:8201"
        }
        storage "raft" {
          path = "/openbao/data"
          node_id = "node1"
        }
        seal "static" {
          current_key_id = "v1"
          current_key    = "env://OPENBAO_UNSEAL_KEY"
        }
        service_registration "kubernetes" {}
      ingress:
        enabled: true
        ingressClassName: internal
        hosts:
          - host: openbao.${SECRET_DOMAIN:=internal}
            paths: []
        tls:
          - hosts:
              - openbao.${SECRET_DOMAIN:=internal}
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 512Mi
    ui:
      enabled: true
      serviceType: ClusterIP
