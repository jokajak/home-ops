---
# ServiceAccount used by OpenBao's Kubernetes secrets engine to mint short-lived tokens.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: claude
  namespace: security
---
# Broad read-only view of cluster state. Intentionally excludes Secret values.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: claude-readonly
rules:
  # Core
  - apiGroups: [""]
    resources:
      - configmaps
      - endpoints
      - events
      - limitranges
      - namespaces
      - nodes
      - persistentvolumeclaims
      - persistentvolumes
      - pods
      - pods/log
      - replicationcontrollers
      - resourcequotas
      - serviceaccounts
      - services
    verbs: ["get", "list", "watch"]
  # Workloads
  - apiGroups: ["apps"]
    resources:
      - daemonsets
      - deployments
      - replicasets
      - statefulsets
    verbs: ["get", "list", "watch"]
  # Batch
  - apiGroups: ["batch"]
    resources:
      - cronjobs
      - jobs
    verbs: ["get", "list", "watch"]
  # Autoscaling
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["get", "list", "watch"]
  # Policy
  - apiGroups: ["policy"]
    resources:
      - poddisruptionbudgets
    verbs: ["get", "list", "watch"]
  # Networking
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingressclasses
      - ingresses
      - networkpolicies
    verbs: ["get", "list", "watch"]
  # Storage
  - apiGroups: ["storage.k8s.io"]
    resources:
      - csidrivers
      - csinodes
      - csistoragecapacities
      - storageclasses
      - volumeattachments
    verbs: ["get", "list", "watch"]
  # RBAC
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - clusterrolebindings
      - clusterroles
      - rolebindings
      - roles
    verbs: ["get", "list", "watch"]
  # API extensions
  - apiGroups: ["apiextensions.k8s.io"]
    resources:
      - customresourcedefinitions
    verbs: ["get", "list", "watch"]
  # Flux — GitOps engine state
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources:
      - kustomizations
    verbs: ["get", "list", "watch"]
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources:
      - helmreleases
    verbs: ["get", "list", "watch"]
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources:
      - buckets
      - gitrepositories
      - helmcharts
      - helmrepositories
      - ocirepositories
    verbs: ["get", "list", "watch"]
  - apiGroups: ["notification.toolkit.fluxcd.io"]
    resources:
      - alerts
      - providers
      - receivers
    verbs: ["get", "list", "watch"]
  - apiGroups: ["image.toolkit.fluxcd.io"]
    resources:
      - imagepolicies
      - imagerepositories
      - imageupdateautomations
    verbs: ["get", "list", "watch"]
  # Cert-manager
  - apiGroups: ["cert-manager.io"]
    resources:
      - certificaterequests
      - certificates
      - clusterissuers
      - issuers
    verbs: ["get", "list", "watch"]
  - apiGroups: ["acme.cert-manager.io"]
    resources:
      - challenges
      - orders
    verbs: ["get", "list", "watch"]
  # External Secrets Operator
  - apiGroups: ["external-secrets.io"]
    resources:
      - clusterexternalsecrets
      - clustersecretstores
      - externalsecrets
      - pushsecrets
      - secretstores
    verbs: ["get", "list", "watch"]
  # CloudNative PG
  - apiGroups: ["postgresql.cnpg.io"]
    resources:
      - backups
      - clusters
      - poolers
      - scheduledbackups
    verbs: ["get", "list", "watch"]
  # Prometheus Operator
  - apiGroups: ["monitoring.coreos.com"]
    resources:
      - alertmanagerconfigs
      - alertmanagers
      - podmonitors
      - probes
      - prometheuses
      - prometheusrules
      - servicemonitors
      - thanosrulers
    verbs: ["get", "list", "watch"]
  # Cilium CNI
  - apiGroups: ["cilium.io"]
    resources:
      - ciliumclusterwidenetworkpolicies
      - ciliumendpoints
      - ciliumidentities
      - ciliuml2announcementpolicies
      - ciliumloadbalancerippools
      - ciliumnodes
      - ciliumnetworkpolicies
    verbs: ["get", "list", "watch"]
  # VolSync backup
  - apiGroups: ["volsync.backube"]
    resources:
      - replicationdestinations
      - replicationsources
    verbs: ["get", "list", "watch"]
  # Dragonfly (Redis-compatible store)
  - apiGroups: ["dragonflydb.io"]
    resources:
      - dragonflies
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: claude-readonly
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: claude-readonly
subjects:
  - kind: ServiceAccount
    name: claude
    namespace: security
