---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: observability
resources:
  - ./helmrelease.yaml
  - ./helmrepository.yaml
  - ./secret.sops.yaml
  - ./externalSecret.yaml
  - ../../../../templates/gatus/guarded
configMapGenerator:
  - name: grafana-dashboard-ntopng
    files:
      - dashboards/ntopng-wan-bandwidth.json
    options:
      labels:
        grafana_dashboard: "true"
      annotations:
        grafana_folder: "ntopng"
