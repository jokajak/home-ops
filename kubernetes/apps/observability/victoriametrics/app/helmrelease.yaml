---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vm
  namespace: observability
spec:
  interval: 30m
  chart:
    spec:
      chart: victoria-metrics-k8s-stack
      version: 0.85.6
      sourceRef:
        kind: HelmRepository
        name: victoriametrics
        namespace: observability
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  dependsOn:
    - name: csi-driver-nfs
      namespace: kube-system
  values:
    # -- victoria-metrics-operator dependency chart configuration.
    # -- For possible values refer to https://github.com/VictoriaMetrics/helm-charts/tree/master/charts/victoria-metrics-operator#parameters
    # -- also checkout here possible ENV variables to configure operator behaviour https://docs.victoriametrics.com/operator/vars
    victoria-metrics-operator:
      operator:
        # -- By default, operator converts prometheus-operator objects.
        disable_prometheus_converter: false

    defaultDashboards:
      enabled: true
      dashboards:
        # Disable dashboards that duplicate those in the Grafana HelmRelease
        kubernetes-system-api-server:
          enabled: false
        kubernetes-system-coredns:
          enabled: false
        kubernetes-views-global:
          enabled: false
        kubernetes-views-namespaces:
          enabled: false
        kubernetes-views-nodes:
          enabled: false
        node-exporter-full:
          enabled: false
    dashboards:
      vmalert: true
      operator: true

    vmsingle:
      spec:
        retentionPeriod: 2y
        storage:
          storageClassName: nfs-csi

    # vmalert evaluates the (converted) VMRules and notifies the in-stack
    # Alertmanager; the chart auto-wires the notifier when both are enabled.
    vmalert:
      enabled: true

    # In-cluster Alertmanager. No external alerting sink exists yet, so alerts
    # route to a null receiver — they're still visible/queryable in the
    # Alertmanager and vmalert UIs. To push notifications later, add a receiver
    # (e.g. webhook/slack/discord) + matching route; keep any URL/token out of
    # git via an ExternalSecret-backed secret referenced from spec.configSecret.
    alertmanager:
      enabled: true
      config:
        route:
          receiver: "blackhole"
          group_by: ["alertname", "namespace"]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h
        receivers:
          - name: "blackhole"

    #################################################
    ###              dependencies               #####
    #################################################
    # Grafana dependency chart configuration. For possible values refer to https://github.com/grafana/helm-charts/tree/main/charts/grafana#configuration
    grafana:
      enabled: false

    ## install vm operator crds
    crds:
      enabled: true
      upgrade:
        enabled: true

    ## install prometheus operator crds
    prometheus-operator-crds:
      enabled: false
