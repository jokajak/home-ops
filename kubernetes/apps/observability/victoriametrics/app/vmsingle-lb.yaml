---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vmsingle-influx-proxy-config
  namespace: observability
data:
  default.conf: |
    server {
      listen 8428;
      location / {
        proxy_pass http://vmsingle-vm-victoria-metrics-k8s-stack.observability.svc.cluster.local:8428;
        proxy_hide_header X-Influxdb-Version;
        add_header X-Influxdb-Version "1.8.0" always;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmsingle-influx-proxy
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vmsingle-influx-proxy
  template:
    metadata:
      labels:
        app: vmsingle-influx-proxy
    spec:
      containers:
        - name: nginx
          image: nginx:1-alpine
          ports:
            - containerPort: 8428
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 32Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8428
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8428
            initialDelaySeconds: 5
      volumes:
        - name: config
          configMap:
            name: vmsingle-influx-proxy-config
---
apiVersion: v1
kind: Service
metadata:
  name: vmsingle-lb
  namespace: observability
spec:
  type: LoadBalancer
  ports:
    - name: http
      port: 8428
      protocol: TCP
      targetPort: 8428
  selector:
    app: vmsingle-influx-proxy
