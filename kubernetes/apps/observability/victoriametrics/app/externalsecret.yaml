---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager
  namespace: observability
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-fields
  target:
    name: alertmanager-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Full Alertmanager config consumed by VMAlertmanager via spec.configSecret.
        # The webhook URL is the only secret value; the routing structure is non-sensitive.
        alertmanager.yaml: |
          route:
            receiver: webhook
            group_by: ["alertname", "namespace"]
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 4h
          receivers:
            - name: webhook
              webhook_configs:
                - url: "{{ .webhook_url }}"
                  send_resolved: true
  data:
    - secretKey: webhook_url
      remoteRef:
        key: alertmanager
        property: webhook_url
