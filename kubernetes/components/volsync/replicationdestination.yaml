---
# AD-HOC RESTORE TEMPLATE — not part of the volsync Component (see kustomization.yaml).
# Apply manually to restore ${APP}'s latest restic snapshot into a new PVC named
# "${APP}-dst" (then point the app at it / copy the data). Needs the same ${APP} +
# ${VOLSYNC_*} substitutions the component uses. Creating it triggers a restore immediately.
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/volsync.backube/replicationdestination_v1alpha1.json
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: "${APP}-dst"
  labels:
    # don't let Flux fight the mover over status/trigger fields
    kustomize.toolkit.fluxcd.io/ssa: IfNotPresent
spec:
  # manual restore: bump this value (or set restoreAsOf) to trigger a restore-on-demand.
  trigger:
    manual: restore-once
  restic:
    repository: ${APP}-volsync-secret
    copyMethod: Direct
    capacity: ${VOLSYNC_CAPACITY:=1Gi}
    accessModes:
      - ${VOLSYNC_ACCESSMODES:=ReadWriteOnce}
    storageClassName: ${VOLSYNC_STORAGECLASS:=nfs-csi}
    cacheCapacity: ${VOLSYNC_CACHE_CAPACITY:=2Gi}
    cacheStorageClassName: ${VOLSYNC_CACHE_STORAGECLASS:=openebs-hostpath}
    moverSecurityContext:
      runAsUser: ${VOLSYNC_PUID:=1000}
      runAsGroup: ${VOLSYNC_PGID:=1000}
      fsGroup: ${VOLSYNC_PGID:=1000}
