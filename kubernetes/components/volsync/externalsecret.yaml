---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: "${APP}-volsync"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-login
  target:
    name: "${APP}-volsync-secret"
    template:
      type: Opaque
      data:
        # restic repo per app, under the shared `backups` MinIO bucket
        RESTIC_REPOSITORY: "s3:https://s3.${SECRET_DOMAIN}/backups/volsync/${APP}"
        RESTIC_PASSWORD: "{{ .restic_password }}"
        AWS_ACCESS_KEY_ID: "{{ .aws_access_key_id }}"
        AWS_SECRET_ACCESS_KEY: "{{ .aws_secret_access_key }}"
  refreshInterval: 1h
  data:
    # restic repository encryption password (terraform/bitwarden -> "volsync restic")
    - secretKey: restic_password
      remoteRef:
        key: volsync restic
        property: password
    # MinIO S3 credentials for the `backups` bucket (terraform/minio -> minio-tf-backups)
    - secretKey: aws_access_key_id
      remoteRef:
        key: minio-tf-backups
        property: username
    - secretKey: aws_secret_access_key
      remoteRef:
        key: minio-tf-backups
        property: password
