---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
# Reusable VolSync (restic -> MinIO) backup/restore for an app's PVC.
# Pull into an app's ks.yaml via:
#   spec:
#     components:
#       - ../../../../components/volsync
#     postBuild:
#       substitute:
#         APP: <app>
#         VOLSYNC_CLAIM: <pvc-name>     # defaults to ${APP}
#         VOLSYNC_CAPACITY: 1Gi
#         VOLSYNC_STORAGECLASS: nfs-csi
resources:
  - ./externalsecret.yaml
  - ./replicationsource.yaml
  - ./replicationdestination.yaml
