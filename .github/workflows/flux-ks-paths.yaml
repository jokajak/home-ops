---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Flux Kustomization Paths"

on:
  pull_request:
    branches: ["main"]
    paths: ["kubernetes/**", "scripts/validate-ks-paths.sh"]

jobs:
  flux-ks-paths:
    name: Validate Flux Kustomization paths
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate spec.path references resolve
        shell: bash
        run: bash ./scripts/validate-ks-paths.sh kubernetes
